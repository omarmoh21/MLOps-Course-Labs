name: CI/CD Pipeline  # Name shown in GitHub Actions tab

# ── When does this run? ───────────────────────────────────────────────────────
on:
  push:
    branches:
      - main          # Triggers on every push to main branch

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ============================================================================
  # JOB 1: TEST
  # Run pytest before we build anything — don't deploy broken code
  # ============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest       # GitHub spins up a fresh Ubuntu machine

    steps:
      # 1. Download your repo code onto the GitHub machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install uv (fast package manager your project uses)
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      # 4. Install all dependencies from uv.lock (exact versions, reproducible)
      - name: Install dependencies
        run: uv sync --frozen

      # 5. Run your tests with coverage
      - name: Run tests
        run: uv run pytest tests/ -v --cov=app --cov=main --cov-report=term-missing

  # ============================================================================
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # Only runs if Job 1 (test) passes
  # ============================================================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                  # ← waits for test job to pass first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to Docker Hub using secrets stored in GitHub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the image and push it to Docker Hub
      # Image will be tagged as: yourusername/churn-api:latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/churn-api:latest

  # ============================================================================
  # JOB 3: DEPLOY TO EC2
  # Only runs if Job 2 (build & push) passes
  # ============================================================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push        # ← waits for image to be pushed first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # SSH into your EC2 instance and run commands on it
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}       # your EC2 public IP
          username: ${{ secrets.EC2_USER }}   # usually "ubuntu"
          key: ${{ secrets.EC2_SSH_KEY }}     # contents of your .pem file

          # These commands run ON your EC2 machine:
          script: |
            # Pull the latest image from Docker Hub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/churn-api:latest

            # Stop and remove the old running container (if any)
            docker stop churn-api || true
            docker rm churn-api || true

            # Start a new container with the fresh image
            docker run -d \
              --name churn-api \
              --restart always \
              -p 8000:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/churn-api:latest
